version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chamaleon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: chamaleon
      POSTGRES_PASSWORD: chamaleon123
      POSTGRES_DB: chamaleon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chamaleon -d chamaleon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
